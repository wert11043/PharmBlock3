<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藥理 Block 3 配合題</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>藥理 Block 3 配合題</h1>
    <p>Pharmacology Matching Quiz — 點選左欄線索，再點右欄藥物配對</p>
  </header>

  <div class="categories" id="fieldChips"></div>
  <div class="categories categories-secondary" id="groupChips"></div>

  <div class="toolbar">
    <button class="tool-btn" id="resetBtn">重新練習</button>
    <button class="tool-btn answer-btn" id="toggleAnswerBtn">顯示答案</button>
  </div>

  <div class="status" id="statusBar">
    進度 <b id="progressText">0 / 0</b> &nbsp;｜&nbsp; 錯誤 <b id="errorText">0</b>
  </div>

  <div class="grid" id="quizView">
    <div>
      <div class="col-label">線索 / 提示</div>
      <div class="col" id="clueCol"></div>
    </div>
    <div>
      <div class="col-label">藥物名稱</div>
      <div class="col" id="answerCol"></div>
    </div>
  </div>

  <div class="result" id="resultCard">
    <div class="big" id="resultScore">100%</div>
    <p id="resultText"></p>
    <button id="playAgainBtn">再試一次</button>
  </div>

  <div id="answerView">
    <table class="answer-table" id="answerTable">
      <thead><tr><th id="fieldHeader">線索 / 提示</th><th>藥物</th></tr></thead>
      <tbody id="answerBody"></tbody>
    </table>
  </div>

  <script src="quiz-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
