<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藥理 Block 3 配合題</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>藥理 Block 3 配合題</h1>
    <p>Pharmacology Matching Quiz — 點選左欄線索，再點右欄藥物；上方可切換藥物群組與練習欄位</p>
  </header>

  <div class="filters">
    <div class="filter-label">藥物群組</div>
    <div class="categories" id="groupChips"></div>
    <div class="filter-label">練習欄位</div>
    <div class="categories secondary" id="fieldChips"></div>
  </div>

  <div class="toolbar">
    <button class="tool-btn" id="resetBtn">重新練習</button>
    <button class="tool-btn answer-btn" id="toggleAnswerBtn">顯示答案</button>
  </div>

  <div class="status-card">
    <div class="status" id="statusBar">
      目前模式 <b id="modeText"></b> &nbsp;｜&nbsp; 進度 <b id="progressText">0 / 0</b> &nbsp;｜&nbsp; 錯誤 <b id="errorText">0</b>
    </div>
    <div class="status-note" id="statusNote"></div>
  </div>

  <div class="grid" id="quizView">
    <div>
      <div class="col-label">線索 / 提示</div>
      <div class="col" id="clueCol"></div>
    </div>
    <div>
      <div class="col-label">藥物名稱</div>
      <div class="col" id="answerCol"></div>
    </div>
  </div>

  <div class="result hidden" id="resultCard">
    <div class="big" id="resultScore">100%</div>
    <p id="resultText"></p>
    <button id="playAgainBtn">再試一次</button>
  </div>

  <div id="answerView" class="hidden">
    <div class="answer-caption" id="answerCaption"></div>
    <table class="answer-table">
      <thead>
        <tr>
          <th>藥物</th>
          <th id="fieldHeader">欄位</th>
          <th>考點速記</th>
        </tr>
      </thead>
      <tbody id="answerBody"></tbody>
    </table>
  </div>

  <script src="quiz-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
